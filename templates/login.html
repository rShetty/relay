{% extends "base.html" %}
{% block title %}Login - Relay{% endblock %}
{% set show_sidebar = false %}
{% block auth_content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <svg width="40" height="40" viewBox="0 0 28 28" fill="none">
                <rect width="28" height="28" rx="6" fill="#6366f1"/>
                <path d="M8 14l4 4 8-8" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <h1>Sign in to Relay</h1>
            <p>Connect your AI tools to third-party services</p>
        </div>
        <form action="/auth/login" method="post" class="auth-form" id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
            </div>
            <div class="form-error" id="form-error" style="display:none;"></div>
            <button type="submit" class="btn btn-primary btn-full" id="login-btn">Sign In</button>
        </form>
        <div class="auth-footer">
            Don't have an account? <a href="/auth/register">Create one</a>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const error = document.getElementById('form-error');
    btn.disabled = true;
    btn.textContent = 'Signing in...';
    error.style.display = 'none';
    try {
        const resp = await fetch('/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
            }),
        });
        const data = await resp.json();
        if (!resp.ok) {
            error.textContent = data.detail || data.error || 'Login failed';
            error.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Sign In';
            return;
        }
        window.location.href = '/app';
    } catch (err) {
        error.textContent = 'Network error. Please try again.';
        error.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
    }
});
</script>
{% endblock %}
