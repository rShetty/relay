version: '3.8'

services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - RELAY_ENVIRONMENT=production
      - RELAY_SERVER__HOST=0.0.0.0
      - RELAY_SERVER__PORT=8000
      - RELAY_OAUTH__JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - RELAY_SECURITY__AUDIT_ENABLED=true
      - RELAY_SECURITY__AUDIT_LOG_PATH=/app/logs/audit.log
      # Backend credentials (set in .env or here)
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PAT:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: Redis for distributed rate limiting
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    profiles:
      - production

volumes:
  redis-data:
